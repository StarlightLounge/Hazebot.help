<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#FDB931;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#996515;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
            <feOffset dx="2" dy="2" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.5" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background (Minimalist Obsidian) -->
    <rect width="512" height="512" fill="#0D0D0D" />
    
    <!-- Stylized Gold Weed Leaf -->
    <g transform="translate(256, 220) scale(1.2)" filter="url(#shadow)">
        <path d="M0,-120 C10,-80 30,-60 60,-40 C40,-30 20,-20 10,0 C20,20 40,30 60,40 C30,60 10,80 0,120 C-10,80 -30,60 -60,40 C-40,30 -20,20 -10,0 C-20,-20 -40,-30 -60,-40 C-30,-60 -10,-80 0,-120" fill="url(#goldGradient)" />
        
        <!-- Individual Leaves (Stylized) -->
        <path d="M0,-110 C5,-80 15,-60 40,-40 C15,-60 5,-80 0,-110 Z" fill="#0D0D0D" opacity="0.2" />
        
        <!-- Center Leaf -->
        <path d="M0,-130 C15,-80 15,-30 0,0 C-15,-30 -15,-80 0,-130" fill="url(#goldGradient)" />
        
        <!-- Side Leaves -->
        <path d="M10,-10 C40,-50 80,-60 110,-40 C80,-30 40,-20 10,-10" fill="url(#goldGradient)" transform="rotate(-30)" />
        <path d="M-10,-10 C-40,-50 -80,-60 -110,-40 C-80,-30 -40,-20 -10,-10" fill="url(#goldGradient)" transform="rotate(30)" />
        
        <path d="M10,10 C50,40 60,80 40,110 C30,80 20,40 10,10" fill="url(#goldGradient)" transform="rotate(-60)" />
        <path d="M-10,10 C-50,40 -60,80 -40,110 C-30,80 -20,40 -10,10" fill="url(#goldGradient)" transform="rotate(60)" />
        
        <path d="M10,20 C60,30 100,10 130,-20 C100,-10 60,0 10,20" fill="url(#goldGradient)" transform="rotate(-15)" />
        <path d="M-10,20 C-60,30 -100,10 -130,-20 C-100,-10 -60,0 -10,20" fill="url(#goldGradient)" transform="rotate(15)" />
    </g>
    
    <!-- Server Name Typography -->
    <text x="256" y="420" text-anchor="middle" font-family="Serif, 'Times New Roman'" font-size="42" font-weight="bold" fill="url(#goldGradient)" letter-spacing="8" style="text-transform: uppercase;">
        Elite Elysium
    </text>
    <text x="256" y="455" text-anchor="middle" font-family="Sans-Serif, Arial" font-size="14" fill="#808080" letter-spacing="12" style="text-transform: uppercase; opacity: 0.8;">
        Sovereign Protocol
    </text>
    
    <!-- Minimalist Border -->
    <rect x="20" y="20" width="472" height="472" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.3" />
</svg>
